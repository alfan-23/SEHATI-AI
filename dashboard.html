<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SEHATI - AI | alfan-23</title>
    
    <script>
        (function() {
            const allowedDomain = "alfan-23.github.io";
            const currentDomain = window.location.hostname;
            if (currentDomain !== allowedDomain && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                document.documentElement.innerHTML = `<div style="text-align:center; margin-top:20%;"><h1>LISENSI TIDAK VALID</h1></div>`;
                throw new Error("Unauthorized Access");
            }
            if (!sessionStorage.getItem('isLoggedIn') && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                window.location.href = 'index.html';
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#1e293b', skyblue: '#38bdf8' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden">

    <aside id="sidebar" class="fixed md:relative w-64 bg-navy text-white h-full flex flex-col shadow-2xl z-30 transition-transform duration-300 sidebar-closed md:transform-none">
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-skyblue rounded-lg flex items-center justify-center font-bold text-navy">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h2 class="font-bold text-lg text-skyblue">SEHATI - AI</h2>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 px-3">Modul Analisis</p>
            <button onclick="loadApp('https://alfan-23.github.io/Sehati-Profil-IMP/')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-300 hover:bg-white/10 hover:text-skyblue transition-all group">
                <i class="fa-solid fa-chart-line w-5 group-hover:scale-110 transition"></i> Profil IMP
            </button>
            <button onclick="loadApp('https://alfan-23.github.io/Sehati---Manrisk/')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-300 hover:bg-white/10 hover:text-skyblue transition-all group">
                <i class="fa-solid fa-shield-virus w-5 group-hover:scale-110 transition"></i> Manajemen Risiko
            </button>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-400 rounded-xl hover:bg-red-500/20 transition-all text-xs font-bold uppercase tracking-widest">
                <i class="fa-solid fa-power-off"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full">
        <header class="bg-white border-b border-slate-200 px-4 md:px-6 py-3 flex items-center justify-between z-20">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-navy">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div class="hidden md:flex items-center gap-2 text-slate-400">
                    <i class="fa-solid fa-key text-[10px]"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Sistem Rotasi API Aktif</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar">
                <input type="password" id="api_key_0" class="min-w-[80px] text-[10px] px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:ring-2 focus:ring-skyblue outline-none" placeholder="Key 1">
                <input type="password" id="api_key_1" class="min-w-[80px] text-[10px] px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:ring-2 focus:ring-skyblue outline-none" placeholder="Key 2">
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden">
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-slate-100">
                <div class="w-20 h-20 bg-white rounded-3xl shadow-xl flex items-center justify-center mb-6">
                    <i class="fa-solid fa-microchip text-4xl text-skyblue opacity-20"></i>
                </div>
                <h2 class="text-xl font-bold text-navy tracking-tight">SEHATI - AI</h2>
                <p class="text-slate-400 text-xs mt-2 max-w-xs">Pilih modul di menu samping untuk memulai penyusunan dokumen berbasis kecerdasan buatan.</p>
            </div>
            <iframe id="appFrame" class="w-full h-full bg-white hidden" src="about:blank"></iframe>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('sidebar-closed');
            sb.classList.toggle('sidebar-open');
        }

        function loadApp(url) {
            const key = document.getElementById('api_key_0').value;
            if(!key) { alert("Masukkan minimal API Key 1!"); return; }
            
            if(window.innerWidth < 768) toggleSidebar();
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            const frame = document.getElementById('appFrame');
            frame.classList.remove('hidden');
            frame.src = `${url}?key=${encodeURIComponent(key)}`;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
