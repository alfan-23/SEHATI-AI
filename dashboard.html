<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SEHATI - AI | alfan-23</title>
    
    <script>
        (function() {
            const allowedDomain = "alfan-23.github.io";
            const currentDomain = window.location.hostname;
            if (currentDomain !== allowedDomain && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                document.documentElement.innerHTML = `<div style="text-align:center; margin-top:20%;"><h1>LISENSI TIDAK VALID</h1></div>`;
                throw new Error("Unauthorized Access");
            }
            if (!sessionStorage.getItem('isLoggedIn') && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                window.location.href = 'index.html';
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#1e293b', skyblue: '#38bdf8' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden">

    <aside id="sidebar" class="fixed md:relative w-72 bg-navy text-white h-full flex flex-col shadow-2xl z-30 transition-transform duration-300 sidebar-closed md:transform-none">
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-skyblue rounded-lg flex items-center justify-center font-bold text-navy">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-skyblue leading-tight">SEHATI - AI</h2>
                    <p class="text-[9px] text-slate-400 tracking-widest uppercase">Admin Terpadu</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 px-3">Modul Analisis</p>
            <button onclick="loadApp('https://alfan-23.github.io/Sehati-Profil-IMP/')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-300 hover:bg-white/10 hover:text-skyblue transition-all group">
                <i class="fa-solid fa-chart-line w-5 group-hover:scale-110 transition"></i> Profil IMP
            </button>
            <button onclick="loadApp('https://alfan-23.github.io/Sehati---Manrisk/')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-300 hover:bg-white/10 hover:text-skyblue transition-all group">
                <i class="fa-solid fa-shield-virus w-5 group-hover:scale-110 transition"></i> Manajemen Risiko
            </button>
        </nav>

        <div class="p-5 border-t border-slate-700 bg-slate-800/50">
            <label class="block text-[10px] font-bold text-skyblue uppercase tracking-widest mb-2">
                <i class="fa-solid fa-key mr-1"></i> Kunci API (Gemini)
            </label>
            <input type="password" id="api_key_input" class="w-full text-xs px-3 py-2.5 border border-slate-600 bg-slate-900 rounded-lg focus:ring-2 focus:ring-skyblue outline-none text-white mb-2" placeholder="Masukkan API Key...">
            
            <p class="text-[9px] text-slate-400 leading-relaxed mb-4">
                Belum memiliki API Key? <br>
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-skyblue font-bold hover:underline flex items-center mt-1">
                    Dapatkan Gratis di Sini <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-[8px]"></i>
                </a>
            </p>

            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20 transition-all text-xs font-bold uppercase tracking-widest">
                <i class="fa-solid fa-power-off"></i> Keluar Portal
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full">
        <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between z-20 md:hidden">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 text-navy bg-slate-100 rounded-lg">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <span class="font-bold text-navy">SEHATI - AI</span>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden">
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-slate-50">
                <div class="w-24 h-24 bg-white rounded-full shadow-xl flex items-center justify-center mb-6 border-4 border-slate-100">
                    <i class="fa-solid fa-microchip text-4xl text-skyblue opacity-50"></i>
                </div>
                <h2 class="text-2xl font-bold text-navy tracking-tight mb-2">Sistem Administrasi Terpadu</h2>
                <p class="text-slate-500 text-sm max-w-md">Silakan masukkan <b>API Key</b> di menu samping kiri, lalu pilih modul aplikasi untuk memulai penyusunan dokumen.</p>
            </div>
            <iframe id="appFrame" class="w-full h-full bg-white hidden" src="about:blank"></iframe>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('sidebar-closed');
            sb.classList.toggle('sidebar-open');
        }

        function loadApp(url) {
            const key = document.getElementById('api_key_input').value.trim();
            if(!key) { 
                alert("PENTING: Mohon masukkan API Key Gemini di menu samping kiri terlebih dahulu!"); 
                return; 
            }
            
            if(window.innerWidth < 768) toggleSidebar(); // Tutup sidebar di HP setelah klik
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            const frame = document.getElementById('appFrame');
            frame.classList.remove('hidden');
            frame.src = `${url}?key=${encodeURIComponent(key)}`;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
