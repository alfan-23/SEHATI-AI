<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEHATI - AI | alfan-23</title>
    
    <script>
        (function() {
            const allowedDomain = "alfan-23.github.io";
            const currentDomain = window.location.hostname;
            if (currentDomain !== allowedDomain && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                document.documentElement.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#1e293b; color:#38bdf8; font-family:sans-serif; text-align:center; padding:20px;">
                        <div>
                            <h1 style="font-size:2rem; margin-bottom:10px;">⚠️ LISENSI TIDAK VALID</h1>
                            <p>Akses hanya diizinkan melalui domain resmi: <b>${allowedDomain}</b></p>
                        </div>
                    </div>`;
                throw new Error("Unauthorized Access");
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#1e293b', skyblue: '#38bdf8' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f1f5f9; }
        .bg-gradient-navy { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .form-transition { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
        <div class="md:w-5/12 bg-gradient-navy text-white p-10 flex flex-col justify-center relative overflow-hidden">
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-skyblue rounded-full opacity-20 blur-2xl"></div>
            <div class="relative z-10">
                <h1 class="text-3xl font-bold mb-2 text-skyblue leading-tight">SEHATI - AI</h1>
                <p class="text-xs font-medium text-slate-400 mb-6 uppercase tracking-wider">Sistem Administrasi Kesehatan Terpadu berbasis AI</p>
                <p class="text-sm text-slate-300 leading-relaxed mb-8">
                    Integrasi sistem informasi untuk manajemen mutu, risiko, dan akreditasi fasyankes berbasis teknologi kecerdasan buatan.
                </p>
                <div class="space-y-4">
                    <div class="flex items-center space-x-3 text-xs text-slate-400">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <span>Integrasi Layanan Primer (ILP) Ready</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:w-7/12 p-8 md:p-12 relative flex flex-col justify-center">
            <div id="loginForm" class="form-transition block">
                <h2 class="text-2xl font-bold text-navy mb-6">Selamat Datang</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Jenis Fasyankes</label>
                        <select id="loginFasyankes" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-skyblue outline-none text-sm">
                            <option value="">Pilih Jenis</option>
                            <option value="Puskesmas">Puskesmas</option>
                            <option value="Klinik">Klinik / Praktik Mandiri</option>
                            <option value="Rumah Sakit">Rumah Sakit</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
                        <input type="email" id="loginEmail" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none text-sm" placeholder="email@fasyankes.id">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Password</label>
                        <input type="password" id="loginPassword" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none text-sm" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-navy text-white font-semibold py-3 rounded-lg hover:bg-slate-800 transition shadow-lg mt-2">
                        Masuk ke Dashboard
                    </button>
                </form>
                <p class="text-center text-sm text-slate-500 mt-6">
                    Belum memiliki akun? <a href="#" onclick="toggleForm('register')" class="text-skyblue font-semibold hover:underline">Registrasi Fasyankes</a>
                </p>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-20 flex flex-col justify-center items-center rounded-r-2xl">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-skyblue mb-4"></div>
                <p class="text-navy font-semibold">Memverifikasi...</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz45tKwXC2c1bdEDDWd-97sF8KJweuNPlLvVUAYrGW_m8U2-3yorbaeaYemuFLnX9c4/exec";
        function toggleForm(type) {
            document.getElementById('loginForm').style.display = (type === 'login') ? 'block' : 'none';
        }
        async function handleLogin(e) {
            e.preventDefault();
            document.getElementById('loader').classList.remove('hidden');
            const payload = {
                action: 'login',
                fasyankes: document.getElementById('loginFasyankes').value,
                email: document.getElementById('loginEmail').value,
                pass: document.getElementById('loginPassword').value
            };
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                if (result.status === 'success') {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('unitKerja', result.unitKerja);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Akses Ditolak: " + result.message);
                }
            } catch (err) {
                alert("Kesalahan koneksi.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
